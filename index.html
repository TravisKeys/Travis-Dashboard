<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Command — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-mark">DC</div>
        <div class="sidebar-brand-text">
          <div class="sidebar-brand-title">Daily</div>
          <div class="sidebar-brand-sub">Command</div>
        </div>
      </div>

      <nav class="nav">
        <div class="nav-section-label">Operations</div>
        <a class="nav-item active" href="#dashboard">
          <span class="nav-marker"></span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-item" href="apps/tasks.html">
          <span class="nav-marker"></span>
          <span class="nav-label">Task Tracker</span>
        </a>
        <a class="nav-item" href="#notes">
          <span class="nav-marker"></span>
          <span class="nav-label">Notes Vault</span>
        </a>
        <a class="nav-item" href="#habits">
          <span class="nav-marker"></span>
          <span class="nav-label">Habit Logger</span>
        </a>

        <div class="nav-section-label">Intelligence</div>
        <a class="nav-item" href="#finance">
          <span class="nav-marker"></span>
          <span class="nav-label">Finance</span>
        </a>
        <a class="nav-item" href="#reading">
          <span class="nav-marker"></span>
          <span class="nav-label">Reading</span>
        </a>
        <a class="nav-item" href="#links">
          <span class="nav-marker"></span>
          <span class="nav-label">Quick Links</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a class="nav-item" href="#settings">
          <span class="nav-marker"></span>
          <span class="nav-label">Settings</span>
        </a>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">Daily Command</div>
          <div class="brand-sub">Executive Ops</div>
        </div>
        <div class="topbar-right">
          <div class="header-info">
            <div class="date-display" id="date">—</div>
            <div class="time-display" id="time">—</div>
          </div>
          <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
          </button>
        </div>
      </header>

      <section class="greeting-block">
        <h1 id="greeting-text">Good morning</h1>
        <p class="greeting-sub">Your starting point for the day.</p>
      </section>

      <section class="content">
        <div class="section-header">
          <div class="section-title">Applications</div>
          <div class="section-meta" id="card-count">—</div>
        </div>

        <div class="cards" id="cards"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
